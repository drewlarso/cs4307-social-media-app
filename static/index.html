<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Social Media</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="min-h-screen">
        <div id="app">
            <navbar
                :username="username"
                :current-tab="currentTab"
                @tab-change="handleTabChange"
                @logout="logout"
            ></navbar>
            <login-popup
                :show="showLoginPopup"
                @login="handleLogin"
            ></login-popup>
            <user-list-modal
                :show="showFollowersModal"
                :title="'Followers'"
                :users="followersList"
                :current-user-id="parseInt(accountId)"
                @close="showFollowersModal = false"
                @view-profile="viewUserProfile"
            ></user-list-modal>
            <user-list-modal
                :show="showFollowingModal"
                :title="'Following'"
                :users="followingList"
                :current-user-id="parseInt(accountId)"
                @close="showFollowingModal = false"
                @view-profile="viewUserProfile"
            ></user-list-modal>
            <user-list-modal
                :show="showBlocksModal"
                :title="'Blocked Users'"
                :users="blockedUsersList"
                :current-user-id="parseInt(accountId)"
                :show-unblock="true"
                @close="showBlocksModal = false"
                @unblock="handleUnblock"
            ></user-list-modal>
            
            <!-- Post Modal -->
            <post-modal
                :show="showPostModal"
                :post="selectedPost"
                :replies="postReplies"
                :current-username="username"
                :current-account-id="parseInt(accountId)"
                @close="closePostModal"
                @reply-submitted="viewPost(selectedPost)"
            ></post-modal>
            
            <main class="p-6 max-w-6xl mx-auto">
                <!-- Home Tab with Recommendations Sidebar -->
                <div v-if="currentTab === 'home'" class="flex gap-6">
                    <!-- Main Feed Column -->
                    <div class="flex-1 space-y-4">
                        <post-input
                            v-model="newPostContent"
                            :username="username"
                            @submit="submitPost"
                        ></post-input>

                        <post-item
                            v-for="post in posts"
                            :key="post.post_id"
                            :post-id="post.post_id"
                            :account-id="parseInt(accountId)"
                            :poster-account-id="post.account_id"
                            :username="post.username"
                            :content="post.content"
                            :title="post.title"
                            :created-at="post.created_at"
                        ></post-item>

                        <div v-if="posts.length === 0" class="text-center text-[var(--color-text-muted)] py-8">
                            No posts yet
                        </div>
                    </div>
                    
                    <!-- Recommendations Sidebar -->
                    <div v-if="username && showRecommendations" class="w-80 space-y-4">
                        <recommended-posts
                            :account-id="parseInt(accountId)"
                            @view-post="viewRecommendedPost"
                            @view-all-posts="viewAllRecommendedPosts"
                        ></recommended-posts>
                        
                        <recommended-accounts
                            :account-id="parseInt(accountId)"
                            :current-username="username"
                            @view-profile="viewUserProfile"
                            @view-all-accounts="viewAllRecommendedAccounts"
                        ></recommended-accounts>
                        
                        <popular-follows
                            :account-id="parseInt(accountId)"
                            @view-profile="viewUserProfile"
                        ></popular-follows>
                    </div>
                </div>

                <!-- Discover Tab -->
                <div v-else-if="currentTab === 'discover'" class="space-y-4">
                    <template v-if="!selectedTopic">
                        <h2 class="text-xl font-bold text-white mb-4">Discover Topics</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <topic-card
                                v-for="topic in topics"
                                :key="topic.topic_id"
                                :topic="topic"
                                :post-count="topic.postCount"
                                @select="selectTopic"
                            ></topic-card>
                        </div>
                        <div v-if="topics.length === 0" class="text-center text-[var(--color-text-muted)] py-8">
                            No topics yet
                        </div>
                    </template>

                    <template v-else>
                        <div class="flex items-center gap-4 mb-4">
                            <button
                                @click="backToTopics"
                                class="px-3 py-1.5 text-sm rounded-lg border border-[var(--color-border-dark)] text-[var(--color-text-muted)] hover:text-white hover:border-[var(--color-primary)] transition-colors"
                            >
                                ← Back to Topics
                            </button>
                            <h2 class="text-xl font-bold text-white">{{ selectedTopic.topic_name }}</h2>
                        </div>
                        <post-item
                            v-for="post in topicPosts"
                            :key="post.post_id"
                            :post-id="post.post_id"
                            :account-id="parseInt(accountId)"
                            :poster-account-id="post.account_id"
                            :username="post.username"
                            :content="post.content"
                            :title="post.title"
                            :created-at="post.created_at"
                        ></post-item>
                        <div v-if="topicPosts.length === 0" class="text-center text-[var(--color-text-muted)] py-8">
                            No posts in this topic yet
                        </div>
                    </template>
                </div>

                <!-- Profile Tab -->
                <div v-else-if="currentTab === 'profile'" class="space-y-4">
                    <!-- Profile Header -->
                    <div class="rounded-xl border border-[var(--color-border-dark)] p-6" style="background-color: var(--color-surface-dark);">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-16 h-16 rounded-full bg-[var(--color-primary)] flex items-center justify-center text-white font-bold text-2xl">
                                {{ viewingUsername ? viewingUsername.charAt(0).toUpperCase() : '?' }}
                            </div>
                            <div class="flex-1">
                                <h2 class="text-xl font-bold text-white">@{{ viewingUsername }}</h2>
                                <div class="flex gap-4 mt-2">
                                    <button @click="openFollowersModal" class="text-sm text-[var(--color-text-muted)] hover:text-white transition-colors">
                                        <strong class="text-white">{{ followerCount }}</strong> followers
                                    </button>
                                    <button @click="openFollowingModal" class="text-sm text-[var(--color-text-muted)] hover:text-white transition-colors">
                                        <strong class="text-white">{{ followingCount }}</strong> following
                                    </button>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button
                                    v-if="showFollowButton"
                                    @click="toggleFollow"
                                    class="px-4 py-2 rounded-lg font-medium transition-colors"
                                    :class="isFollowingUser ? 'bg-[var(--color-border-dark)] text-white hover:bg-red-600' : 'bg-[var(--color-primary)] text-white hover:bg-[var(--color-primary-hover)]'"
                                >
                                    {{ isFollowingUser ? 'Unfollow' : 'Follow' }}
                                </button>
                                <button
                                    v-if="!viewingOwnProfile"
                                    @click="toggleBlock"
                                    class="px-4 py-2 rounded-lg font-medium transition-colors"
                                    :class="isBlockedUser ? 'bg-[var(--color-border-dark)] text-white hover:bg-red-600' : 'bg-[var(--color-border-dark)] text-[var(--color-text-muted)] hover:bg-red-600 hover:text-white'"
                                >
                                    {{ isBlockedUser ? 'Unblock' : 'Block' }}
                                </button>
                                <button
                                    v-if="viewingOwnProfile"
                                    @click="openBlocksModal"
                                    class="px-4 py-2 rounded-lg font-medium transition-colors bg-[var(--color-border-dark)] text-[var(--color-text-muted)] hover:text-white"
                                >
                                    Blocked
                                </button>
                                <button
                                    v-if="!viewingOwnProfile"
                                    @click="viewOwnProfile"
                                    class="px-4 py-2 rounded-lg font-medium transition-colors bg-[var(--color-primary)] text-white hover:bg-[var(--color-primary-hover)]"
                                >
                                    Back to My Profile
                                </button>
                            </div>
                        </div>
                    </div>

                    <post-item
                        v-for="post in profilePosts"
                        :key="post.post_id"
                        :post-id="post.post_id"
                        :account-id="parseInt(accountId)"
                        :poster-account-id="post.account_id"
                        :username="post.username"
                        :content="post.content"
                        :title="post.title"
                        :created-at="post.created_at"
                    ></post-item>
                    <div v-if="profilePosts.length === 0" class="text-center py-12">
                        <p class="text-[var(--color-text-muted)] mb-2">No posts yet</p>
                        <p class="text-sm text-[var(--color-text-muted)]">Share your thoughts to see them here!</p>
                    </div>
                </div>

                <div v-else class="rounded-xl p-6">
                    {{ message }}
                </div>
            </main>
        </div>
        <script src="api.js"></script>
        <script src="components/Navbar.js"></script>
        <script src="components/LoginPopup.js"></script>
        <script src="components/PostInput.js"></script>
        <script src="components/Post.js"></script>
        <script src="components/TopicCard.js"></script>
        <script src="components/UserListModal.js"></script>
        <script src="components/RecommendedPosts.js"></script>
        <script src="components/RecommendedAccounts.js"></script>
        <script src="components/PopularFollows.js"></script>
        <script src="components/PostModal.js"></script>
        <script src="app.js"></script>
    </body>
</html>
